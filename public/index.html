<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room App Starter</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main>
      <h1>Room App Starter</h1>

      <!-- Join form: visible before the user enters a room -->
      <section id="join-section">
        <input id="username" placeholder="Username" />
        <input id="roomId" placeholder="Room ID (e.g. csci-101)" />
        <button id="joinBtn">Join Room</button>
      </section>

      <!-- Chat area: shown after successfully joining a room -->
      <section id="chat-section" hidden>
        <p id="status"></p>
        <div id="messages"></div>
        <form id="messageForm">
          <input id="messageInput" placeholder="Type a message..." />
          <button type="submit">Send</button>
        </form>
        <!-- Live counter: updates on every join/leave via room:count event -->
        <p id="member-count">Members: 0</p>
      </section>
    </main>

    <!-- Socket.IO client library served automatically by the server -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Application client logic -->
    <script src="/js/app.js"></script>
  </body>
</html>
